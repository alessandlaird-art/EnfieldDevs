<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="theme.css">
</head>
<body class="dark-bg">

<div class="form-wrapper">
    <form id="contact-form" method="POST" action="sendmail.php" class="contact-card">

        <h2 class="form-title">Get in Touch</h2>
        <p class="form-subtitle">We’d love to hear from you</p>

        <div class="form-row form-error" style="display:none;"></div>

        <div class="form-row">
            <label for="contact-form-name">Name</label>
            <input id="contact-form-name" class="form-input" type="text" name="name" required>
        </div>

        <div class="form-row">
            <label for="contact-form-email">Email</label>
            <input id="contact-form-email" class="form-input" type="email" name="email" required>
        </div>

        <div class="form-row">
            <label for="contact-form-phone">Phone</label>
            <input id="contact-form-phone" class="form-input" type="tel" name="phone">
        </div>

        <div class="form-row">
            <label for="contact-form-message">Message</label>
            <textarea id="contact-form-message" class="form-input textarea" name="message" required></textarea>
        </div>

        <button type="submit" class="submit-button">Send Message</button>
    </form>
</div>

</body>
</html>
