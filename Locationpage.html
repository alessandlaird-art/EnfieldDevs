    <script>
        function myMap() {
            // Random location in Enfield
            var location = { lat: 51.6521, lng: -0.0799 };
        
            var map = new google.maps.Map(document.getElementById("googleMap"), {
                center: location,
                zoom: 14
            });
        
            // Add a marker at that location
            var marker = new google.maps.Marker({
                position: location,
                map: map,
                title: "Enfield Location"
            });
        }
        </script>
